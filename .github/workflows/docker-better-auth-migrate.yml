name: Build and Push Better Auth Migrate Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "migration/better-auth/**"
      - "frontend/**"
      - ".github/workflows/docker-better-auth-migrate.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./migration/better-auth/Dockerfile
          push: true
          tags: wutipong/albums-better-auth-migrate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
