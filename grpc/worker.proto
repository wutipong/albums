syntax = "proto3";

option go_package = "/service/pb";

// Worker service definition.
service WorkerService {

  // Notify worker to process specific asset.
  rpc NotifyProcessAsset(EncodeTextInput) returns (NotifyProcessAssetResponse);

  // Notify worker to queue unprocessed asset to processing queue.
  rpc NotifyScanCache(NotifyScanCacheRequest) returns (NotifyScanCacheResponse);

  // Update album thumbnail.
  rpc UpdateAlbumThumbnail(UpdateAlbumThumbnailRequest) returns (UpdateAlbumThumbnailResponse);
}

//Status of the asset.
enum AssetStatus {
  PENDING    = 0;
  PROCESSING = 1;
  PROCESSED  = 2;
}

// NotifyProcessAssetRequest
message NotifyProcessAssetResquest {
  string id = 1;
}

// NotifyProcessAssetResponse
message NotifyProcessAssetResponse {
  string      id     = 1;
  AssetStatus status = 2;
}

// NotifyScanCacheRequest
message NotifyScanCacheRequest {
  // empty
}

// NotifyScanCacheResponse
message NotifyScanCacheResponse {
  // empty
}

message UpdateAlbumThumbnailRequest {
  string id       = 1;
  string asset_id = 2 ;
}

message UpdateAlbumThumbnailResponse {
  string id       = 1;
  string asset_id = 2;
}