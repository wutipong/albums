version: "2"
plugins:
- name: ts
  wasm:
    url: https://downloads.sqlc.dev/plugin/sqlc-gen-typescript_0.1.3.wasm
    sha256: 287df8f6cc06377d67ad5ba02c9e0f00c585509881434d15ea8bd9fc751a9368
servers:
- engine: postgresql
  uri: ${DATABASE_URL}
sql:
  - engine: "postgresql"
    queries: 
      - "db/queries/albums.sql"
      - "db/queries/assets.sql"
    schema: "db/migrations/"
    database:
      managed: true
    codegen:
    - out: src/lib/server/db
      plugin: ts
      options:
        runtime: node
        driver: postgres